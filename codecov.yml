codecov:
  require_ci_to_pass: true
  notify:
    # Wait for all 5 matrix uploads (Python 3.8-3.12) before posting the comment,
    # so it never reports partial/flaky numbers.
    after_n_builds: 5

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%        # don't fail the check on sub-1% wobble
    patch:
      default:
        target: 80%
        informational: true  # report patch coverage, but don't block the PR

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
  behavior: default
