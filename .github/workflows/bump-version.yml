name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the version change back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all tags

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and commit
        run: |
          # 1. Bump version and capture the output
          BUMP_OUTPUT=$(uv version --bump ${{ github.event.inputs.bump_type }})
          
          # 2. Extract ONLY the version number (the part after the last space)
          # This turns "steinerpy 0.1.3 => 1.0.0" into "1.0.0"
          NEW_VERSION=$(echo "$BUMP_OUTPUT" | awk '{print $NF}')
          echo "New Version Extracted: $NEW_VERSION"
          
          # 3. Sync the lockfile
          uv lock
          
          # 4. Commit and Tag using the cleaned version number
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release $NEW_VERSION"
          
          # 5. Push back to main
          git push origin main --follow-tags
