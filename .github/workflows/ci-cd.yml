name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Serialize release runs so two quick merges can't race on the version bump/push.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=steinerpy --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: Bump version & publish to PyPI
    needs: test
    # Run only on a real merge/push to main. Skip PRs, and skip the bot's own
    # bump commit (belt-and-suspenders: GITHUB_TOKEN pushes don't retrigger anyway).
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest

    # Dedicated environment for publishing — register this name on PyPI's
    # trusted-publisher config (Publishing -> Add a pending publisher).
    environment:
      name: pypi
      url: https://pypi.org/project/steinerpy/

    permissions:
      contents: write   # push the bump commit + tag back to main
      id-token: write   # OIDC trusted publishing to PyPI (no API token needed)

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.11

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Bump patch version
      id: bump
      run: |
        BUMP_OUTPUT=$(uv version --bump patch)
        NEW_VERSION=$(echo "$BUMP_OUTPUT" | awk '{print $NF}')
        echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "Bumped to $NEW_VERSION"
        uv lock

    - name: Commit, tag, and push
      run: |
        git add pyproject.toml uv.lock
        git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
        git tag -a "v${{ steps.bump.outputs.version }}" -m "Release ${{ steps.bump.outputs.version }}"
        git push origin HEAD:main --follow-tags

    - name: Build distributions
      run: uv build

    - name: Publish to PyPI
      # uv auto-detects the OIDC token from id-token: write — no PYPI_API_TOKEN.
      run: uv publish
