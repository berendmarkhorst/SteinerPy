name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # <--- This will catch the tags created by the bump workflow
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        version: "latest"
    
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: uv sync --dev
    
    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=steinerpy --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: test
    # Only publish if we pushed a tag (not just a regular commit)
    if: startsWith(github.ref, 'refs/tags/v') 
    runs-on: ubuntu-latest
    
    # These permissions are required for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python
      run: uv python install 3.11
    
    - name: Build package
      run: uv build
    
    - name: Publish to PyPI
      # No secrets.PYPI_API_TOKEN needed! 
      # uv detects the OIDC token automatically if permissions are set above.
      run: uv publish
